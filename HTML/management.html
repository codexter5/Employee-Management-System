<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Management</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Employee Management</h1>

<h2>Add Employee</h2>

<form>

<label>Name</label>
<input type="text">

<label>Email</label>
<input type="email">

<label>Department</label>
<input type="text">

<label>Position</label>
<input type="text">

<button>Add Employee</button>

</form>

<hr>

<h2>Employee Records</h2>

<table border="1">

<tr>

<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Department</th>
<th>Position</th>

</tr>

<tr>

<td>EMP001</td>
<td>Ram Sharma</td>
<td>ram@gmail.com</td>
<td>IT</td>
<td>Developer</td>

</tr>

</table>


<hr>

<h2>Attendance</h2>

<form>

<label>Employee</label>
<input type="text">

<label>Date</label>
<input type="date">

<label>Status</label>

<select>
<option>Present</option>
<option>Absent</option>
</select>

<button>Save Attendance</button>

</form>


<hr>

<h2>Leave Management</h2>

<form>

<label>Leave Type</label>
<input type="text">

<label>From Date</label>
<input type="date">

<label>To Date</label>
<input type="date">

<button>Apply Leave</button>

</form>


<hr>

<h2>Payroll</h2>

<form>

<label>Employee</label>
<input type="text">

<label>Salary</label>
<input type="number">

<button>Save Payroll</button>

</form>


<hr>

<h2>Profile</h2>

<p>Name: John Doe</p>
<p>Department: IT</p>
<p>Email: john@gmail.com</p>


<hr>

<h2>Settings</h2>

<form>

<label>Admin Email</label>
<input type="email">

<label>New Password</label>
<input type="password">

<button>Save Settings</button>

</form>

</body>
</html>
