<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Management System - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="authScreen" class="auth-screen">

<div class="auth-left">
<div class="brand-box">
<h1>Employee Management System</h1>
<p>Manage employees, attendance, leaves, payroll, and profiles in one professional dashboard.</p>
</div>

<div class="info-boxes">
<div class="info-card">Manage employee records easily</div>
<div class="info-card">Track attendance and leave requests</div>
<div class="info-card">Maintain payroll and profile details</div>
</div>
</div>

<div class="auth-right">

<div class="auth-card">

<div class="auth-tabs">
<button class="tab-btn active">Employee Login</button>
<button class="tab-btn">Admin Login</button>
<button class="tab-btn">Register</button>
</div>

<!-- Employee Login -->
<div class="auth-form">

<h2>Employee Login</h2>

<form>

<div class="form-group">
<label>Email</label>
<input type="email" placeholder="Enter email">
</div>

<div class="form-group">
<label>Password</label>
<input type="password" placeholder="Enter password">
</div>

<button class="btn primary-btn">Login</button>

</form>

</div>

<!-- Admin Login -->

<div class="auth-form">

<h2>Admin Login</h2>

<form>

<div class="form-group">
<label>Email</label>
<input type="email">
</div>

<div class="form-group">
<label>Password</label>
<input type="password">
</div>

<button class="btn primary-btn">Admin Login</button>

</form>

</div>

<!-- Register -->

<div class="auth-form">

<h2>Create Account</h2>

<form>

<div class="form-group">
<label>Full Name</label>
<input type="text">
</div>

<div class="form-group">
<label>Email</label>
<input type="email">
</div>

<div class="form-group">
<label>Password</label>
<input type="password">
</div>

<button class="btn primary-btn">Register</button>

</form>

</div>

</div>

</div>

</div>

</body>
</html>
